version: 2

sources:
  - name: public
    database: financeiro
    schema: public
    description: "Schema principal do banco financeiro com dados brutos de mercado"
    tables:
      - name: raw_stock_prices
        description: "Dados brutos de preços de ações ingeridos via yfinance. Contém OHLCV diário para 5 ações americanas dos últimos 2 anos."
        columns:
          - name: symbol
            description: "Ticker da ação (ex: AAPL, MSFT)"
            tests:
              - not_null
          - name: date
            description: "Data do pregão"
            tests:
              - not_null
          - name: close
            description: "Preço de fechamento do dia"
            tests:
              - not_null

models:
  - name: stg_stock_prices
    description: "Staging de preços de ações. Padroniza nomes de colunas e seleciona apenas campos relevantes da raw."
    columns:
      - name: symbol
        description: "Ticker da ação"
      - name: date
        description: "Data do pregão"
      - name: price_open
        description: "Preço de abertura"
      - name: price_high
        description: "Preço máximo do dia"
      - name: price_low
        description: "Preço mínimo do dia"
      - name: price_close
        description: "Preço de fechamento"
      - name: volume
        description: "Volume negociado no dia"